<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用語集 - QA Learning Trainer</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="img/qa-learning-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="img/qa-learning-icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QA Learning Trainer">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZ9EN5NX5F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-BZ9EN5NX5F');
    </script>
    <nav id="main-nav" class="hidden"></nav>
    <nav id="breadcrumb-nav" class="hidden"></nav>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <a href="index.html" class="header-back" aria-label="ホームへ戻る">
                <span class="material-icons">arrow_back_ios</span>
            </a>
            <h1 class="header-title">用語集</h1>
        </div>
    </header>

    <main class="app-main" id="app-container">
        <section id="glossary-screen">
            <div class="settings-group" style="padding:14px;margin-bottom:14px;">
                <label for="glossary-cert-select" style="display:block;font-weight:700;margin-bottom:8px;">学習コース</label>
                <select id="glossary-cert-select" aria-label="用語集の学習コース" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);"></select>
                <p id="glossary-count" style="margin:8px 0 0;color:var(--text-muted);font-size:0.84rem;"></p>
            </div>
            <div id="glossary-search-container">
                <input type="search" id="glossary-search-input" placeholder="用語を検索…" aria-label="用語検索">
            </div>
            <div id="glossary-list">
                <p class="no-results hidden">検索結果はありません。</p>
            </div>
            <button class="back-to-top-button" type="button">ホームに戻る</button>
        </section>
    </main>

    <nav class="bottom-nav" role="navigation" aria-label="メインナビゲーション">
        <a href="index.html" class="bottom-nav-item" id="nav-home">
            <span class="material-icons">home</span>
            <span class="bottom-nav-label">ホーム</span>
        </a>
        <a href="study.html" class="bottom-nav-item" id="nav-quiz">
            <span class="material-icons">edit_note</span>
            <span class="bottom-nav-label">クイズ</span>
        </a>
        <a href="ai-quiz.html" class="bottom-nav-item" id="nav-ai">
            <span class="material-icons">policy</span>
            <span class="bottom-nav-label">方針</span>
        </a>
        <a href="glossary.html" class="bottom-nav-item" id="nav-glossary">
            <span class="material-icons">sort_by_alpha</span>
            <span class="bottom-nav-label">用語集</span>
        </a>
    </nav>

    <script type="module" src="js/utils.js?v=2"></script>
    <script type="module" src="js/glossary.js?v=2"></script>
</body>
</html>
